services:
  mysql-staff:
    image: mysql:8.0
    container_name: mysql-staff
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: staff_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_staff_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p123456"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - digitalshop-network

  mysql-customer:
    image: mysql:8.0
    container_name: mysql-customer
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: customer_db
    ports:
      - "3308:3306"
    volumes:
      - mysql_customer_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p123456"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - digitalshop-network

  postgres-laptop:
    image: postgres:15
    container_name: postgres-laptop
    environment:
      POSTGRES_DB: laptop_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - postgres_laptop_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d laptop_db"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - digitalshop-network

  postgres-clothes:
    image: postgres:15
    container_name: postgres-clothes
    environment:
      POSTGRES_DB: clothes_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5433:5432"
    volumes:
      - postgres_clothes_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clothes_db"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - digitalshop-network

  postgres-cart:
    image: postgres:15
    container_name: postgres-cart
    environment:
      POSTGRES_DB: cart_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5434:5432"
    volumes:
      - postgres_cart_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cart_db"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - digitalshop-network

  laptop-service:
    build: ./laptop-service
    container_name: laptop-service
    environment:
      DEBUG: "1"
      SECRET_KEY: laptop_secret_key
      DB_NAME: laptop_db
      DB_USER: postgres
      DB_PASSWORD: 123456
      DB_HOST: postgres-laptop
      DB_PORT: 5432
      TIME_ZONE: Asia/Ho_Chi_Minh
    command: sh -c "python manage.py migrate && python manage.py seed_data && python manage.py runserver 0.0.0.0:8003"
    depends_on:
      postgres-laptop:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health/')"]
      interval: 10s
      timeout: 5s
      retries: 12
    ports:
      - "8003:8003"
    networks:
      - digitalshop-network

  clothes-service:
    build: ./clothes-service
    container_name: clothes-service
    environment:
      DEBUG: "1"
      SECRET_KEY: clothes_secret_key
      DB_NAME: clothes_db
      DB_USER: postgres
      DB_PASSWORD: 123456
      DB_HOST: postgres-clothes
      DB_PORT: 5432
      TIME_ZONE: Asia/Ho_Chi_Minh
    command: sh -c "python manage.py migrate && python manage.py seed_data && python manage.py runserver 0.0.0.0:8004"
    depends_on:
      postgres-clothes:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health/')"]
      interval: 10s
      timeout: 5s
      retries: 12
    ports:
      - "8004:8004"
    networks:
      - digitalshop-network

  cart-service:
    build: ./cart-service
    container_name: cart-service
    environment:
      DEBUG: "1"
      SECRET_KEY: cart_secret_key
      DB_NAME: cart_db
      DB_USER: postgres
      DB_PASSWORD: 123456
      DB_HOST: postgres-cart
      DB_PORT: 5432
      LAPTOP_SERVICE_URL: http://laptop-service:8003
      CLOTHES_SERVICE_URL: http://clothes-service:8004
      SERVICE_TIMEOUT: 10
      TIME_ZONE: Asia/Ho_Chi_Minh
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8005"
    depends_on:
      postgres-cart:
        condition: service_healthy
      laptop-service:
        condition: service_healthy
      clothes-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/health/')"]
      interval: 10s
      timeout: 5s
      retries: 12
    ports:
      - "8005:8005"
    networks:
      - digitalshop-network

  staff-service:
    build: ./staff-service
    container_name: staff-service
    environment:
      DEBUG: "1"
      SECRET_KEY: staff_secret_key
      DB_NAME: staff_db
      DB_USER: root
      DB_PASSWORD: 123456
      DB_HOST: mysql-staff
      DB_PORT: 3306
      LAPTOP_SERVICE_URL: http://laptop-service:8003
      CLOTHES_SERVICE_URL: http://clothes-service:8004
      SERVICE_TIMEOUT: 10
      TIME_ZONE: Asia/Ho_Chi_Minh
    command: sh -c "python manage.py migrate && python manage.py seed_data && python manage.py runserver 0.0.0.0:8001"
    depends_on:
      mysql-staff:
        condition: service_healthy
      laptop-service:
        condition: service_healthy
      clothes-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health/')"]
      interval: 10s
      timeout: 5s
      retries: 12
    ports:
      - "8001:8001"
    networks:
      - digitalshop-network

  customer-service:
    build: ./customer-service
    container_name: customer-service
    environment:
      DEBUG: "1"
      SECRET_KEY: customer_secret_key
      DB_NAME: customer_db
      DB_USER: root
      DB_PASSWORD: 123456
      DB_HOST: mysql-customer
      DB_PORT: 3306
      LAPTOP_SERVICE_URL: http://laptop-service:8003
      CLOTHES_SERVICE_URL: http://clothes-service:8004
      CART_SERVICE_URL: http://cart-service:8005
      SERVICE_TIMEOUT: 10
      TIME_ZONE: Asia/Ho_Chi_Minh
    command: sh -c "python manage.py migrate && python manage.py seed_data && python manage.py runserver 0.0.0.0:8002"
    depends_on:
      mysql-customer:
        condition: service_healthy
      laptop-service:
        condition: service_healthy
      clothes-service:
        condition: service_healthy
      cart-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health/')"]
      interval: 10s
      timeout: 5s
      retries: 12
    ports:
      - "8002:8002"
    networks:
      - digitalshop-network

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    depends_on:
      staff-service:
        condition: service_healthy
      customer-service:
        condition: service_healthy
      laptop-service:
        condition: service_healthy
      clothes-service:
        condition: service_healthy
    ports:
      - "8000:80"
    networks:
      - digitalshop-network

volumes:
  mysql_staff_data:
  mysql_customer_data:
  postgres_laptop_data:
  postgres_clothes_data:
  postgres_cart_data:

networks:
  digitalshop-network:
    driver: bridge
